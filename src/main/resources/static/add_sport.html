<body class="bg-background text-on-background">
<!-- SideNavBar -->

    <div class="mb-10 px-2">
        <img alt="School Sports Manager Logo" class="h-10 w-auto mb-2" src="https://lh3.googleusercontent.com/aida/AP1WRLu8enxgvQP0DoTXUbXekkSuj_Ph8IJoyd6COPU3XISpqRY1XhUm5axOyGz6cdbvz12f-r4GxhdWp47LuKF1o-Ulb2GSFS-3GW_Fc7Ey8ptXdGSPnrs7cnXpx8e3PdXiw90gCtau2yfABr7JpIcLaMgIJYQYHZgsbIei7FHs70P34jptl-wPGObjYh5oXTQBy9Xzlomq_NYMbTao-bBWq70TaVTWZ8gtsp9hf0yEIjJ6jAJnzZZWnhcYWg">
        <h1 class="font-display-lg text-headline-md font-extrabold text-primary-container tracking-tighter">School Sports</h1>
        <p class="font-body-md text-on-surface-variant text-sm">Elite Athletics</p>
    </div>
    <nav class="flex-grow space-y-2">
        <a class="flex items-center gap-3 px-4 py-3 text-on-primary-container bg-primary-container rounded-xl font-bold transition-transform active:scale-95 duration-150" href="#">
            <span class="material-symbols-outlined">sports_handball</span>
            <span class="font-body-md">종목 신청</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high transition-colors duration-200 rounded-xl" href="#">
            <span class="material-symbols-outlined">fact_check</span>
            <span class="font-body-md">신청 확인</span>
        </a>
    </nav>
    <div class="mt-auto pt-6 border-t border-outline-variant flex items-center gap-3 px-2">
        <div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
            <img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRKWmOD3pHmH4dQacfIpV1zL0m6UFedUyoVm8vSKnEUVk3Z758UVdmqA82SMyAuwpCQ0l_eAGI1ZfnRpug4jaoKb4FXlmrFyTql838eQP-inHizWapxVbHxGoxatk1dHbVPQTx7wlYdQ4SRgJcj6cce2QOWxXgbSlOftH2zNnNQZcnSTfQ9uIBP5ZCKUujflECpzi1BaEyvlDJSv9DAsRzfU_uFjdQYDfkWJMwEVIPPg4ZmC7ehdbUTH3pvM8-bXsTBzcVZXEsZQ">
        </div>
        <div>
            <p class="text-sm font-bold text-on-surface">관리자</p>

    </div>
</aside>
<!-- TopNavBar -->
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-background/80 backdrop-blur-md flex justify-between items-center px-gutter z-40">
    <div class="ml-4">
        <h2 class="font-headline-md text-primary-fixed tracking-tight">종목 추가</h2>
    </div>
    <div class="flex items-center gap-4">
        <button class="text-on-surface-variant hover:text-primary-fixed transition-all">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <button class="text-on-surface-variant hover:text-primary-fixed transition-all">
            <span class="material-symbols-outlined">settings</span>
        </button>
        <div class="w-8 h-8 rounded-full border border-outline-variant overflow-hidden">
            <img alt="Administrator Profile" class="w-full h-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsPHY3Sssz9NopVVctR-zdwlRzYoTJCbjia9l6Ahto1ZfKQscQETW6uIrgWnOTc3yoHDXreXU4Yj2cgDVrHnJUyKyCqN2zP_A7vnmGTKlCGO6ECkdqxgJXzgVKGfzzChtTTMbBElXVvD1wIeV9vnQBa9k7PYgPUXbk5_1YFCFhdlKhXDM326d1Bq49LpeV_SIx7hQTn7sbb5Lb6WPsC8ARujy4QDGGQIfzmqKSeknHhF2UqY_nPBXMH7RlE3xOnhyYAoCvte76jQ">
        </div>
    </div>
</header>
<!-- Main Content Area -->
<main class="ml-64 pt-16 min-h-screen p-stack-lg relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-secondary-container/10 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="max-w-4xl mx-auto relative z-10">
        <section class="mb-stack-lg">
            <h2 class="font-display-lg text-display-lg text-primary mb-2">새 종목 등록</h2>
            <p class="font-body-lg text-on-surface-variant">체육대회에 새로운 스포츠 종목을 추가합니다. 모든 정보는 참가자 신청 화면에 반영됩니다.</p>
        </section>
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 glass-card p-8 rounded-xl lg:col-span-12">
                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="font-label-caps text-on-surface-variant uppercase tracking-widest text-xs">종목 이름</label>
                        <input id="sportName" class="w-full bg-surface-container-lowest border-outline-variant text-on-surface p-4 rounded-lg input-focus-glow transition-all font-body-md" placeholder="예: 농구, 배드민턴, 100m 달리기" required="" type="text">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="font-label-caps text-on-surface-variant uppercase tracking-widest text-xs">카테고리</label>
                            <select class="w-full bg-surface-container-lowest border-outline-variant text-on-surface p-4 rounded-lg input-focus-glow transition-all font-body-md appearance-none"><option>축구</option><option>농구</option><option>야구</option><option>계주</option></select>
                        </div>
                        <div class="space-y-2">
                            <label class="font-label-caps text-on-surface-variant uppercase tracking-widest text-xs">최대 참가 인원</label>
                            <div class="relative">
                                <input id="maxMember" class="w-full bg-surface-container-lowest border-outline-variant text-on-surface p-4 rounded-lg input-focus-glow transition-all font-body-md" placeholder="0" required="" type="number">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">명</span>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-outline-variant flex items-center justify-end gap-4">
                        <button class="px-8 py-3 rounded-xl border border-primary-container text-primary-container font-bold hover:bg-primary-container/10 transition-all active:scale-95" type="button" onclick="location.href='index.html'">
                            취소
                        </button>
                        <button class="px-8 py-3 rounded-xl bg-primary-container text-on-primary-container font-extrabold neon-glow hover:brightness-110 transition-all active:scale-95" type="submit">
                            등록 완료
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<script>
    // Micro-interactions for form inputs
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.parentElement.classList.add('scale-[1.01]');
            input.parentElement.parentElement.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.parentElement.classList.remove('scale-[1.01]');
        });
    });

    // 폼 제출 → DB에 종목 추가
    document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();

        const sportName = document.getElementById('sportName').value;
        const maxMember = document.getElementById('maxMember').value;

        fetch('http://localhost:8080/sports', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                sportName: sportName,
                maxMember: parseInt(maxMember)
            })
        })
            .then(response => response.json())
            .then(data => {
                alert('종목이 성공적으로 등록되었습니다.');
                location.href = 'index.html';
            })
            .catch(error => {
                alert('등록 중 오류가 발생했습니다.');
                console.error(error);
            });
    });
</script>

</body></html>
