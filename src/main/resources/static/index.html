<body class="antialiased font-body-md text-body-md bg-background text-on-background flex h-screen w-full overflow-hidden">

<div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="bg-surface shadow-sm w-full z-50 flex justify-between md:justify-end items-center px-container-margin h-16 transition-colors border-b border-surface-container-high shrink-0">

        <div class="flex items-center gap-stack-sm">
            <button onclick="location.href='add_sport.html'" class="flex items-center justify-center bg-primary-container text-on-primary-container font-bold py-2 px-4 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-transform">
                <span class="material-symbols-outlined mr-base">add</span>
                종목 추가
            </button>
        </div>
    </header>
    <main class="flex-1 overflow-y-auto max-w-7xl mx-auto w-full px-gutter md:px-container-margin py-stack-md md:py-stack-lg flex flex-col gap-stack-md">
        <div class="flex justify-between items-end mb-stack-sm">
            <div>
                <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-background mb-base">종목 신청</h1>
                <p class="text-on-surface-variant text-body-lg">원하는 스포츠 종목을 선택하고 팀을 구성하세요.</p>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-stack-sm md:gap-stack-md items-start" id="sportsContainer">

            <article class="sport-card bg-surface-container-low rounded-xl p-stack-md shadow-[0px_4px_20px_rgba(0,0,0,0.2)] border border-surface-container-high hover:border-primary-container transition-all group cursor-pointer col-span-1">
                <div class="flex items-center gap-4">
                    <div class="icon-box w-12 h-12 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                        <span class="material-symbols-outlined text-xl">sports_soccer</span>
                    </div>
                    <div>
                        <h2 class="font-headline-md text-headline-md text-on-background">축구 (남자부)</h2>
                    </div>
                </div>

                <div class="action-area hidden mt-stack-md pt-stack-sm border-t border-surface-container-high">
                    <div class="bg-surface-container rounded-lg p-stack-sm mb-stack-md">
                        <div class="flex gap-6 mb-stack-sm border-b border-surface-container-high pb-3">
                            <label class="flex items-center gap-2 cursor-pointer text-primary-container">
                                <input checked class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_1" type="radio">
                                <span class="font-bold">팀 추가 (Add Team)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-on-surface-variant">
                                <input class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_1" type="radio">
                                <span>팀 선택 (Select Team)</span>
                            </label>
                        </div>
                        <div class="mb-stack-sm pt-2">
                            <label class="block text-sm font-medium text-on-surface-variant mb-2">팀 이름</label>
                            <input class="w-full bg-surface-container-high border border-outline rounded-md p-3 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" placeholder="팀 이름을 입력하세요" type="text">
                        </div>
                    </div>
                    <div class="flex justify-end mt-auto">
                        <button class="bg-primary-container text-on-primary-container font-bold py-2.5 px-8 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-all">
                            신청 완료
                        </button>
                    </div>
                </div>
            </article>

            <article class="sport-card bg-surface-container-low rounded-xl p-stack-md shadow-[0px_4px_20px_rgba(0,0,0,0.2)] border border-surface-container-high hover:border-primary-container transition-all group cursor-pointer col-span-1">
                <div class="flex items-center gap-4">
                    <div class="icon-box w-12 h-12 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                        <span class="material-symbols-outlined text-xl">sports_basketball</span>
                    </div>
                    <div>
                        <h2 class="font-headline-md text-headline-md text-on-background">농구 (혼성)</h2>
                    </div>
                </div>

                <div class="action-area hidden mt-stack-md pt-stack-sm border-t border-surface-container-high">
                    <div class="bg-surface-container rounded-lg p-stack-sm mb-stack-md">
                        <div class="flex gap-6 mb-stack-sm border-b border-surface-container-high pb-3">
                            <label class="flex items-center gap-2 cursor-pointer text-primary-container">
                                <input checked class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_2" type="radio">
                                <span class="font-bold">팀 추가 (Add Team)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-on-surface-variant">
                                <input class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_2" type="radio">
                                <span>팀 선택 (Select Team)</span>
                            </label>
                        </div>
                        <div class="mb-stack-sm pt-2">
                            <label class="block text-sm font-medium text-on-surface-variant mb-2">팀 이름</label>
                            <input class="w-full bg-surface-container-high border border-outline rounded-md p-3 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" placeholder="팀 이름을 입력하세요" type="text">
                        </div>
                    </div>
                    <div class="flex justify-end mt-auto">
                        <button class="bg-primary-container text-on-primary-container font-bold py-2.5 px-8 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-all">
                            신청 완료
                        </button>
                    </div>
                </div>
            </article>

            <article class="sport-card bg-surface-container-low rounded-xl p-stack-md shadow-[0px_4px_20px_rgba(0,0,0,0.2)] border border-surface-container-high hover:border-primary-container transition-all group cursor-pointer col-span-1">
                <div class="flex items-center gap-4">
                    <div class="icon-box w-12 h-12 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                        <span class="material-symbols-outlined text-xl">sprint</span>
                    </div>
                    <div>
                        <h2 class="font-headline-md text-headline-md text-on-background">400m 계주</h2>
                    </div>
                </div>

                <div class="action-area hidden mt-stack-md pt-stack-sm border-t border-surface-container-high">
                    <div class="bg-surface-container rounded-lg p-stack-sm mb-stack-md">
                        <div class="flex gap-6 mb-stack-sm border-b border-surface-container-high pb-3">
                            <label class="flex items-center gap-2 cursor-pointer text-primary-container">
                                <input checked class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_3" type="radio">
                                <span class="font-bold">팀 추가 (Add Team)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer text-on-surface-variant">
                                <input class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_3" type="radio">
                                <span>팀 선택 (Select Team)</span>
                            </label>
                        </div>
                        <div class="mb-stack-sm pt-2">
                            <label class="block text-sm font-medium text-on-surface-variant mb-2">팀 이름</label>
                            <input class="w-full bg-surface-container-high border border-outline rounded-md p-3 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" placeholder="팀 이름을 입력하세요" type="text">
                        </div>
                    </div>
                    <div class="flex justify-end mt-auto">
                        <button class="bg-primary-container text-on-primary-container font-bold py-2.5 px-8 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-all">
                            신청 완료
                        </button>
                    </div>
                </div>
            </article>

        </div>
    </main>
</div>

<script>
    // 아코디언 동작 스크립트
    document.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.sport-card');

        cards.forEach(card => {
            card.addEventListener('click', function(e) {
                // 입력창이나 버튼 등 내부 요소(action-area)를 클릭했을 때는 창이 닫히지 않도록 방지
                if(e.target.closest('.action-area')) return;

                const isAlreadyExpanded = this.classList.contains('expanded');

                // 1. 먼저 모든 카드를 닫기 상태로 초기화
                cards.forEach(c => {
                    c.classList.remove('expanded', 'md:col-span-2', 'lg:col-span-3', 'border-primary-container');
                    c.classList.add('border-surface-container-high', 'col-span-1');

                    const actionArea = c.querySelector('.action-area');
                    if(actionArea) actionArea.classList.add('hidden');

                    const iconBox = c.querySelector('.icon-box');
                    if(iconBox) {
                        iconBox.classList.remove('bg-primary-container', 'text-on-primary-container');
                        iconBox.classList.add('bg-surface-container', 'text-on-surface-variant');
                    }
                });

                // 2. 방금 클릭한 카드가 닫혀있던 상태라면 열어주기
                if (!isAlreadyExpanded) {
                    this.classList.add('expanded', 'md:col-span-2', 'lg:col-span-3', 'border-primary-container');
                    this.classList.remove('border-surface-container-high', 'col-span-1');

                    const actionArea = this.querySelector('.action-area');
                    if(actionArea) actionArea.classList.remove('hidden');

                    const iconBox = this.querySelector('.icon-box');
                    if(iconBox) {
                        iconBox.classList.add('bg-primary-container', 'text-on-primary-container');
                        iconBox.classList.remove('bg-surface-container', 'text-on-surface-variant');
                    }
                }
            });
        });
    });
</script>
</body>
</html>
