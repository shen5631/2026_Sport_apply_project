<!DOCTYPE html>
<html class="dark" lang="ko" style="width: 1280px; height: 1024px; overflow: hidden; position: relative;">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Sports Day Pro - Application</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&amp;family=JetBrains+Mono:wght@600&amp;family=Lexend:wght@400&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#313030",
                        "outline-variant": "#3a4a43",
                        "on-secondary-fixed-variant": "#334284",
                        "tertiary-fixed-dim": "#91db37",
                        "on-tertiary-container": "#427000",
                        "on-primary-fixed": "#002116",
                        "inverse-primary": "#006c50",
                        "on-primary-container": "#007255",
                        "on-error": "#690005",
                        "background": "#131313",
                        "on-tertiary": "#1e3700",
                        "on-tertiary-fixed": "#0f2000",
                        "on-surface-variant": "#b9cbc1",
                        "surface-container-low": "#1c1b1b",
                        "primary-fixed": "#36ffc4",
                        "surface": "#131313",
                        "on-background": "#e5e2e1",
                        "primary": "#fbfffa",
                        "surface-bright": "#393939",
                        "secondary-container": "#354487",
                        "on-primary": "#003828",
                        "secondary": "#b9c3ff",
                        "on-secondary-container": "#a6b4ff",
                        "error-container": "#93000a",
                        "on-surface": "#e5e2e1",
                        "primary-container": "#00ffc2",
                        "on-tertiary-fixed-variant": "#2e4f00",
                        "surface-variant": "#353534",
                        "surface-tint": "#00e1ab",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-fixed": "#001356",
                        "secondary-fixed-dim": "#b9c3ff",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary": "#1a2a6c",
                        "error": "#ffb4ab",
                        "inverse-surface": "#e5e2e1",
                        "tertiary-container": "#abf752",
                        "surface-container-highest": "#353534",
                        "tertiary": "#fefff4",
                        "outline": "#83958c",
                        "primary-fixed-dim": "#00e1ab",
                        "on-primary-fixed-variant": "#00513c",
                        "surface-dim": "#131313",
                        "surface-container": "#201f1f",
                        "secondary-fixed": "#dde1ff",
                        "tertiary-fixed": "#abf853"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "base": "8px",
                        "gutter": "16px",
                        "stack-lg": "48px",
                        "stack-sm": "12px",
                        "container-margin": "24px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "display-lg": ["Anybody"],
                        "headline-md": ["Anybody"],
                        "body-lg": ["Lexend"],
                        "display-lg-mobile": ["Anybody"],
                        "body-md": ["Lexend"]
                    }
                },
            },
        }
    </script>
</head>
<body class="antialiased font-body-md text-body-md bg-background text-on-background flex h-screen w-full overflow-hidden">
<aside class="w-64 bg-surface-container border-r border-surface-container-high h-full flex flex-col hidden md:flex shrink-0">
    <div class="p-stack-md">
        <span class="text-headline-md font-headline-md font-extrabold text-primary-container">Sports Day Pro</span>
    </div>
    <nav class="flex-1 px-stack-sm flex flex-col gap-2">
        <a class="bg-primary-container/10 text-primary-container px-4 py-3 rounded-lg font-bold flex items-center gap-3" href="#">
            <span class="material-symbols-outlined">edit_document</span>
            종목 신청
        </a>
        <a class="text-on-surface-variant hover:text-primary-container hover:bg-surface-container-high px-4 py-3 rounded-lg transition-colors flex items-center gap-3" href="#">
            <span class="material-symbols-outlined">fact_check</span>
            신청 확인
        </a>
    </nav>
</aside>
<div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="bg-surface shadow-sm w-full z-50 flex justify-between md:justify-end items-center px-container-margin h-16 transition-colors border-b border-surface-container-high shrink-0">
        <div class="flex items-center gap-stack-md md:hidden">
            <span class="text-headline-md font-headline-md font-extrabold text-primary-container">Sports Day</span>
        </div>
        <div class="flex items-center gap-stack-sm">
            <button onclick="location.href='add_sport.html'" class="flex items-center justify-center bg-primary-container text-on-primary-container font-bold py-2 px-4 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-transform">
                <span class="material-symbols-outlined mr-base">add</span>
                종목 추가
            </button>
        </div>
    </header>
    <main class="flex-1 overflow-y-auto max-w-7xl mx-auto w-full px-gutter md:px-container-margin py-stack-md md:py-stack-lg flex flex-col gap-stack-md">
        <div class="flex justify-between items-end mb-stack-sm">
            <div>
                <h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-background mb-base">종목 신청</h1>
                <p class="text-on-surface-variant text-body-lg">원하는 스포츠 종목을 선택하고 팀을 구성하세요.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-stack-sm md:gap-stack-md items-start" id="sportsContainer">
            <p class="text-on-surface-variant col-span-full text-center py-10">등록된 종목 정보를 불러오는 중입니다...</p>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 페이지 로드시 백엔드에서 종목 리스트 가져오기
        fetch('http://localhost:8080/sports')
            .then(response => {
                if (!response.ok) throw new Error('네트워크 응답 불안정');
                return response.json();
            })
            .then(data => {
                renderSportsCards(data);
            })
            .catch(error => {
                console.error('조회 에러:', error);
                document.getElementById('sportsContainer').innerHTML = `
                    <p class="text-error col-span-full text-center py-10">데이터를 불러오지 못했습니다. 서버 상태를 확인해주세요.</p>
                `;
            });

        // 2. 아코디언 동작 스크립트 (이벤트 위임 방식 적용으로 동적 카드 대응)
        const container = document.getElementById('sportsContainer');
        container.addEventListener('click', function(e) {
            const clickedCard = e.target.closest('.sport-card');
            if (!clickedCard) return;

            // 입력창 내부 요소(action-area)를 누른 거라면 아코디언 토글 방지
            if (e.target.closest('.action-area')) return;

            const cards = document.querySelectorAll('.sport-card');
            const isAlreadyExpanded = clickedCard.classList.contains('expanded');

            // 모든 카드 초기화 (닫기)
            cards.forEach(c => {
                c.classList.remove('expanded', 'md:col-span-2', 'lg:col-span-3', 'border-primary-container');
                c.classList.add('border-surface-container-high', 'col-span-1');

                const actionArea = c.querySelector('.action-area');
                if(actionArea) actionArea.classList.add('hidden');

                const iconBox = c.querySelector('.icon-box');
                if(iconBox) {
                    iconBox.classList.remove('bg-primary-container', 'text-on-primary-container');
                    iconBox.classList.add('bg-surface-container', 'text-on-surface-variant');
                }
            });

            // 클릭한 카드가 닫혀있었다면 열기
            if (!isAlreadyExpanded) {
                clickedCard.classList.add('expanded', 'md:col-span-2', 'lg:col-span-3', 'border-primary-container');
                clickedCard.classList.remove('border-surface-container-high', 'col-span-1');

                const actionArea = clickedCard.querySelector('.action-area');
                if(actionArea) actionArea.classList.remove('hidden');

                const iconBox = clickedCard.querySelector('.icon-box');
                if(iconBox) {
                    iconBox.classList.add('bg-primary-container', 'text-on-primary-container');
                    iconBox.classList.remove('bg-surface-container', 'text-on-surface-variant');
                }
            }
        });
    });

    // 카테고리 번호에 해당하는 구글 머티리얼 아이콘 마크 매칭 함수
    function getIconByCategory(category) {
        const catNum = parseInt(category, 10);
        switch(catNum) {
            case 1: return 'sports_soccer';       // 축구
            case 2: return 'sports_basketball';   // 농구
            case 3: return 'sports_baseball';     // 야구
            case 4: return 'sprint';              // 계주
            case 5: return 'more_horiz';          // 기타
            default: return 'sports';             // 기본 마크
        }
    }

    // 데이터를 바탕으로 화면에 카드들을 뿌려주는 함수
    function renderSportsCards(sports) {
        const container = document.getElementById('sportsContainer');
        container.innerHTML = '';

        if(sports.length === 0) {
            container.innerHTML = '<p class="text-on-surface-variant col-span-full text-center py-10">등록된 종목이 없습니다.</p>';
            return;
        }

        sports.forEach((sport, index) => {
            const iconName = getIconByCategory(sport.category);
            const uniqueId = sport.id || index; // 라디오 버튼 그룹 구분을 위한 고유 ID

            const cardHtml = `
                <article class="sport-card bg-surface-container-low rounded-xl p-stack-md shadow-[0px_4px_20px_rgba(0,0,0,0.2)] border border-surface-container-high hover:border-primary-container transition-all group cursor-pointer col-span-1">
                    <div class="flex items-center gap-4">
                        <div class="icon-box w-12 h-12 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
                            <span class="material-symbols-outlined text-xl">${iconName}</span>
                        </div>
                        <div>
                            <h2 class="font-headline-md text-headline-md text-on-background">${sport.sportName}</h2>
                            <p class="text-xs text-on-surface-variant mt-1">최대 참가 인원: <span class="text-primary-container font-bold">${sport.maxMember}명</span></p>
                        </div>
                    </div>

                    <div class="action-area hidden mt-stack-md pt-stack-sm border-t border-surface-container-high">
                        <div class="bg-surface-container rounded-lg p-stack-sm mb-stack-md">
                            <div class="flex gap-6 mb-stack-sm border-b border-surface-container-high pb-3">
                                <label class="flex items-center gap-2 cursor-pointer text-primary-container">
                                    <input checked class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_${uniqueId}" type="radio">
                                    <span class="font-bold">팀 추가 (Add Team)</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer text-on-surface-variant">
                                    <input class="text-primary-container focus:ring-primary-container bg-surface-container-high border-outline" name="team_mode_${uniqueId}" type="radio">
                                    <span>팀 선택 (Select Team)</span>
                                </label>
                            </div>
                            <div class="mb-stack-sm pt-2">
                                <label class="block text-sm font-medium text-on-surface-variant mb-2">팀 이름</label>
                                <input class="w-full bg-surface-container-high border border-outline rounded-md p-3 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none" placeholder="팀 이름을 입력하세요" type="text">
                            </div>
                        </div>
                        <div class="flex justify-end mt-auto">
                            <button class="bg-primary-container text-on-primary-container font-bold py-2.5 px-8 rounded-full shadow-[0px_4px_12px_rgba(0,255,194,0.2)] hover:bg-primary-fixed-dim active:scale-95 transition-all">
                                신청 완료
                            </button>
                        </div>
                    </div>
                </article>
            `;
            container.innerHTML += cardHtml;
        });
    }
</script>
</body>
</html>
