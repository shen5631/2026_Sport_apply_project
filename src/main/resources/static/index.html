                data.forEach(student => {
                    const row = `
                    <tr>
                        <td>${student.studentId}</td>
                        <td>${student.name}</td>
                        <td>${student.stdNum}</td>
                        <td>${student.gender}</td>
                        <td>${student.grade}</td>
